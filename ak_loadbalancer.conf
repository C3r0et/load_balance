# ==========================================================
# Nginx Load Balancer Configuration for AKU Infrastructure
# Service: WA Gateway, RCS Message, Autocall
# Type: Path-based Routing with Round Robin Load Balancing
# ==========================================================

# 1. Upstream Group for WA Gateway (5 Nodes)
upstream wa_gateway_cluster {
    server 10.9.9.21:3002;
    server 10.9.9.22:3002;
    server 10.9.9.23:3002;
    server 10.9.9.24:3002;
    server 10.9.9.25:3002;
    # Health check pasif (opsional)
    # server 10.9.9.21:3002 max_fails=3 fail_timeout=30s;
}

# 2. Upstream Group for RCS Message (5 Nodes)
upstream rcs_message_cluster {
    server 10.9.9.26:3003;
    server 10.9.9.27:3003;
    server 10.9.9.28:3003;
    server 10.9.9.29:3003;
    server 10.9.9.30:3003;
}

# 3. Upstream Group for Autocall (5 Nodes)
upstream autocall_cluster {
    server 10.9.9.31:3004;
    server 10.9.9.32:3004;
    server 10.9.9.33:3004;
    server 10.9.9.34:3004;
    server 10.9.9.35:3004;
}

# Server Block for HTTP (Redirect to HTTPS)
server {
    listen 80;
    server_name yourdomain.com; # GANTI dengan domain Anda

    location / {
        return 301 https://$host$request_uri;
    }
}

# Server Block for HTTPS
server {
    listen 443 ssl http2;
    server_name yourdomain.com; # GANTI dengan domain Anda

    # SSL Certificate Configuration (Let's Encrypt Path)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # Recommended SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy Headers (Common for all apps)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- MONITORING & ROUTING ---

    # Static Status for Dashboard
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.9.9.0/24; # Izinkan IP internal memantau
        deny all;
    }

    # 1. Routing for WA Gateway
    location /wa/ {
        proxy_pass http://wa_gateway_cluster/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout settings
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # 2. Routing for RCS Message
    location /rcs/ {
        proxy_pass http://rcs_message_cluster/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. Routing for Autocall
    location /autocall/ {
        proxy_pass http://autocall_cluster/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Default location / handle (Optional)
    location / {
        root /var/www/html;
        index index.html;
    }
}
