# ==========================================================
# Nginx Load Balancer Configuration - AKU INFRASTRUCTURE
# IP Load Balancer: 192.168.56.250
# ==========================================================

# 1. Cluster WA Gateway (192.168.56.11 - 15)
upstream wa_gateway_cluster {
    least_conn; # Distribusi ke yang koneksinya paling sedikit
    server 192.168.56.11:3002;
    server 192.168.56.12:3002;
    server 192.168.56.13:3002;
    server 192.168.56.14:3002;
    server 192.168.56.15:3002;
}

# 2. Cluster RCS Message (192.168.56.31 - 35)
upstream rcs_message_cluster {
    least_conn;
    server 192.168.56.31:3000;
    server 192.168.56.32:3000;
    server 192.168.56.33:3000;
    server 192.168.56.34:3000;
    server 192.168.56.35:3000;
}

# 3. Cluster Autocall (192.168.56.21 - 25)
upstream autocall_cluster {
    least_conn;
    server 192.168.56.21:3003;
    server 192.168.56.22:3003;
    server 192.168.56.23:3003;
    server 192.168.56.24:3003;
    server 192.168.56.25:3003;
}

server {
    listen 80;
    server_name _; # Menerima akses via IP direct

    # Proxy Headers Global
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Routing WA Gateway -> http://192.168.56.250/wa/
    location /wa/ {
        proxy_pass http://wa_gateway_cluster/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeout lebih lama untuk session WhatsApp
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 2. Routing RCS Message -> http://192.168.56.250/rcs/
    location /rcs/ {
        proxy_pass http://rcs_message_cluster/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. Routing Autocall -> http://192.168.56.250/autocall/
    location /autocall/ {
        proxy_pass http://autocall_cluster/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 4. Monitoring Nginx (Optional)
    location /nginx_status {
        stub_status;
        allow 192.168.56.0/24; # Hanya LAN yang bisa akses
        deny all;
    }

    # Root default (Dashboard Monitoring Dashboard bisa ditaruh di sini atau akses port 3005)
    location / {
        root /var/www/html;
        index index.html;
    }
}
